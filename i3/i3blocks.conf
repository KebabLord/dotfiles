# Wifi SSID if connected
[wifiSSID]
command=iwgetid -r | cut -c -12
#color=#20242D
label=
interval=120

# Green Tunnel Switch
[greentunnel]
full_text=

# Hourly weather
[weather]
label=
interval=300

# Date Time
[time]
label=
command=date '+ %d %B %H:%M '
interval=60
align=right
min_width= 00 October 00:00
