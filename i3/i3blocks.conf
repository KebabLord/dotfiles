#GLOBALS
command=$XDG_CONFIG_HOME/i3/scripts/$BLOCK_NAME
separator_block_width=30
separator=false
markup=none
color=#FFFFFF

[soundcloud]
color=#FFFFFF
label= 
interval=2
markup=pango

[spotify]
color=#FFFFFF
#border=#FF8C00
markup=pango
label=
interval=2

[cpu_temp]
label=
markup=pango
#command=zenmonitor-cli -q | grep -Po '(?<=CPU Temperature \(tDie\)\t)\d+\.\d{1}(?=\d*)' | sed 's/$/°C/'
command=sensors | grep -Po "Tctl:[^\+]+\K.*"
interval=3

[memory]
label=
markup=pango
command=free -b | awk '/Mem:/ {printf("%.1fGB %.0f%%\n", ($2-$7)/1024/1024/1024, ($2-$7)/$2*100)}'
interval=3

[crypto]
label=
markup=pango
interval=60
instance=BTCUSDT

#[crypto]
#label=
#markup=pango
#interval=60
#instance=XMRUSDT

#[battery]
#interval=30

# Wifi SSID if connected
[wifiSSID]
command=iwgetid -r | cut -c -12
label=
interval=120

# Green Tunnel Switch
#[greentunnel]
#full_text=DNS:

# Wireguard Switch
[wireguard]
full_text=VPN:

# Pause Wallpaper
#[wallpaper]
#command=xdotool key --window $(xdotool search xwinwrap 2>/dev/null| tail -n 1) space;echo WP:
#full_text=WP:

# Hourly weather
[weather]
label=
interval=300

# Date Time
[time]
label=
command=date '+ %d %B %H:%M '
interval=60
align=right
min_width= 00 October 00:00

